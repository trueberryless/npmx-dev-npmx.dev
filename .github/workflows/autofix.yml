# needed to securely identify the workflow
name: autofix.ci

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code:
    name: 🤖 Autofix code
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: lts/*
          cache: true
          sfw: true

      - parallel:
          - name: 🎨 Check for non-RTL/non-a11y CSS classes
            run: vp run lint:css

          - name: 🌐 Compare translations
            run: vp run i18n:check

          - name: 🌍 Update lunaria data
            run: vp run build:lunaria

          - name: 🔠 Fix lint errors
            run: vp run lint:fix

      - uses: autofix-ci/action@635ffb0c9798bd160680f18fd73371e355b85f27 # v1.3.2
